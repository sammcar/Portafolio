name: Feature request
description: New section, capability or improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Bullet list. An agent or human should know exactly when this is "done".
      placeholder: |
        - [ ] /projects supports filtering by tag
        - [ ] Works in both locales
        - [ ] Unit tests for the filter logic
    validations:
      required: true
